    env:
    - name: GIT_REPO
      value: "codebase.helmholtz.cloud/hifis/overall/kpi/FZJ-Jupyter.git"
    - name: GIT_BRANCH
      value: "master"
    - name: GIT_SUBDIR
      value: "FZJ-Jupyter/stats"
    envFrom:
    - secretRef:
        name: cronjobs
    nodeSelector:
      worker: "true"
    volumes:
      - name: persistent
        nfs:
          path: /mnt/storage/jupyterhub_jupyterjsc
          server: "10.0.20.30"
      - name: cronjobs-cm
        configMap:
          defaultMode: 400
          name: cronjobs
    volumeMounts:
      - name: persistent
        mountPath: /mnt/persistent
      - name: cronjobs-cm
        mountPath: /mnt/volumes
  # second cron
  - name: daily-db-backup
    enabled: true
    namespace: database
    stage: production
    image:
      repository: postgres
      tag: 14.2-alpine
      imagePullPolicy: Always
    schedule: "0 2 * * *"
    podAnnotations:
      sidecar.istio.io/inject: "false"
    failedJobsHistoryLimit: 1
    successfulJobsHistoryLimit: 1
    concurrencyPolicy: Forbid
    backoffLimit: 0
    restartPolicy: Never
    command: ["/bin/sh"]
    args:
      - -c
      - >-
          pg_dump -h postgresql-ha-pgpool -U postgres jupyterhubjupyterjsc > /mnt/persistent/$(date +"%Y%m%d_%H%M%S").jupyterhub.dump ;
          pg_dump -h postgresql-ha-pgpool -U postgres jupyterhubjuniq > /mnt/persistent/$(date +"%Y%m%d_%H%M%S").jupyterhubjuniq.dump ;
          pg_dump -h postgresql-ha-pgpool -U postgres jupyterhubeurocc > /mnt/persistent/$(date +"%Y%m%d_%H%M%S").jupyterhubeurocc.dump ;
          pg_dump -h postgresql-ha-pgpool -U postgres jupyterhubcoeraise > /mnt/persistent/$(date +"%Y%m%d_%H%M%S").jupyterhubcoeraise.dump ;
          pg_dump -h postgresql-ha-pgpool -U postgres jupyterhubportalgauss > /mnt/persistent/$(date +"%Y%m%d_%H%M%S").jupyterhubportalgauss.dump ;
          pg_dump -h postgresql-ha-pgpool -U postgres k8smgr > /mnt/persistent/$(date +"%Y%m%d_%H%M%S").k8smgr.dump ;
          pg_dump -h postgresql-ha-pgpool -U postgres unicoremgr > /mnt/persistent/$(date +"%Y%m%d_%H%M%S").unicoremgr.dump ;
          pg_dump -h postgresql-ha-pgpool -U postgres tunnel > /mnt/persistent/$(date +"%Y%m%d_%H%M%S").tunnel.dump
    
    resources:
      limits:
        cpu: 50m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 256Mi
    env:
    - name: PGPASSWORD
      valueFrom:
        secretKeyRef:
          name: postgresql-auth
          key: postgres-password
    nodeSelector:
      worker: "true"
    volumes:
      - name: persistent
        nfs:
          path: /mnt/storage/db-backups
          server: 10.0.20.30
          # server: 10.0.94.248
    volumeMounts:
      - name: persistent
        mountPath: /mnt/persistent
