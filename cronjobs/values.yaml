    command: ["/bin/sh"]
    args:
      - -c
      - >-
          pip install psycopg2-binary && python3 /mnt/volumes/hpcupdatecheck.py
    
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
    env:
    - name: SQL_HOST
      valueFrom:
        secretKeyRef:
          name: hub-jupyterjsc-generics
          key: SQL_HOST
    - name: SQL_PASSWORD
      valueFrom:
        secretKeyRef:
          name: hub-jupyterjsc-generics
          key: SQL_PASSWORD
    - name: SQL_DATABASE
      valueFrom:
