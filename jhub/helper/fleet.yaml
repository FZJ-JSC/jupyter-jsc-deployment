defaultNamespace: jupyterjsc
helm:
  chart: /workspace/source/hub-base/helper
  releaseName: jupyterjsc-jhub-helper 
  values:
    nameOverride: "jhub-helper"
    mountWatch:
      safeDirectories:
        - "/mnt/shared-data/notebook_template_server"
      extraCommands: |
        test -d /mnt/shared-data/notebook_template_server && cd /mnt/shared-data/notebook_template_server && git pull origin ${NTS_GIT_BRANCH}
    cleanupSQL: 
      enabled: true
    maintenanceCheck:
      enabled: true
    reservationCheck:
      enabled: true
    nginx:
      config: true