# - op: add
#   path: "/spec/template/spec/volumes/-"
#   value:
#     name: persistent
#     nfs:
#       path: /mnt/storage/jupyterhub_jupyterjsc
#       server: 10.0.20.30
- op: replace
  path: "/spec/template/spec/volumes/2/secret/secretName"
  value: internal-ssl-jupyterjsc
- op: replace
  path: "/spec/template/spec/volumes/3/nfs/server"
  value: "10.0.20.30"
- op: replace
  path: "/spec/template/spec/volumes/3/nfs/path"
  value: "/mnt/storage/jupyterhub_jupyterjsc"
- op: add
  path: "/spec/template/spec/volumes/-"
  value:
    name: twofa-keypair
    secret:
      secretName: twofa-keypair
      items:
        - key: twofa
          path: twofa
          mode: 0444
- op: add
  path: "/spec/template/spec/volumes/-"
  value:
    name: twofa-remove-keypair
    secret:
      secretName: twofa-remove-keypair
      items:
        - key: twofa
          path: twofa
          mode: 0444
