defaultNamespace: jupyterjsc
helm:
  chart: /workspace/source/hub-base/helper
  releaseName: jupyterjsc-jhub-juniq-helper 
  values:
    nameOverride: "jhub-juniq-helper"
    mountWatch:
      safeDirectories:
        - "/mnt/shared-data/jhub_files/2.3.1/templates/juniq-staging.fz-juelich.de"
        - "/mnt/shared-data/jhub_files/2.3.1/static/juniq-staging.fz-juelich.de"
        - "/mnt/shared-data/jhub_files/2.3.1/templates/juniq.fz-juelich.de"
        - "/mnt/shared-data/jhub_files/2.3.1/static/juniq.fz-juelich.de"
    nginx:
      service:
        selector:
          app: juniq