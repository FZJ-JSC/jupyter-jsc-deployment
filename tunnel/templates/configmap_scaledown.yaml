apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "drf-tunnel.name" . }}-scale-down
  labels:
    app: {{ template "drf-tunnel.name" . }}
    chart: {{ template "drf-tunnel.chart" . }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
data:
  desired_replicas: 1
  run.sh: |
    #!/bin/bash

    if [[ -n ${TUNNEL_USER_PASS} ]]; then
        export TUNNEL_AUTHENTICATION_TOKEN=${TUNNEL_AUTHENTICATION_TOKEN:-"Basic $(echo -n "${TUNNEL_JUPYTERHUB_USERNAME:-jupyterhub}:${TUNNEL_JUPYTERHUB_USER_PASS}" | base64 -w 0)"}
    fi

    pip install kubernetes tornado
    python3 /mnt/volumes/scale_down.py
  scale_down.py: |
    print("Hello world")