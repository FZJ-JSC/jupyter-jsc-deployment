defaultNamespace: kured
helm:
  releaseName: kured
  repo: https://kubereboot.github.io/charts
  chart: kured
  version: 4.0.4
  values:
    configuration:
      rebootDays:
        - sat
        - sun
      startTime: "3am"
      endTime: "6am"
      timeZone: Europe/Berlin
      drainGracePeriod: "120"
      drainTimeout: "300"
      forceReboot: true
    tolerations:
      - key: node-role.kubernetes.io/master
        effect: NoSchedule
      - key: node-role.kubernetes.io/etcd
        effect: NoExecute
        value: "true"
      - key: node-role.kubernetes.io/controlplane
        effect: NoSchedule
        value: "true"
      - key: airflow
        effect: NoExecute
        value: "true"
      - key: usernode
        effect: NoExecute
        value: "true"
      - key: monitoring
        effect: NoExecute
        value: "true"
