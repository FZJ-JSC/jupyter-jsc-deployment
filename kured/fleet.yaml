defaultNamespace: kured
helm:
  releaseName: kured
  repo: https://kubereboot.github.io/charts
  chart: kured
  version: 4.0.4
  values:
    configuration:
      drainGracePeriod: "120"
      drainTimeout: "300s"
      endTime: "6am"
      forceReboot: true
      lockReleaseDelay: "300s"
      period: "15m"
      rebootDays: ["sat", "sun", "mon"]
      startTime: "3am"
      timeZone: Europe/Berlin
    tolerations:
      - key: node-role.kubernetes.io/master
        effect: NoSchedule
      - key: node-role.kubernetes.io/etcd
        effect: NoExecute
        value: "true"
      - key: node-role.kubernetes.io/controlplane
        effect: NoSchedule
        value: "true"
      - key: airflow
        effect: NoExecute
        value: "true"
      - key: usernode
        effect: NoExecute
        value: "true"
      - key: monitoring
        effect: NoExecute
        value: "true"
