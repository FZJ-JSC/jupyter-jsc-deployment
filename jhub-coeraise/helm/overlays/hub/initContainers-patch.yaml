- op: add
  path: "/spec/template/spec/initContainers/0/env/-"
  value:
    name: TEMPLATE_GIT_REPO
    valueFrom:
      secretKeyRef:
        name: coeraise-share-config
        key: REPOSITORY
- op: add
  path: "/spec/template/spec/initContainers/0/env/-"
  value:
    name: TEMPLATE_GIT_USERNAME
    valueFrom:
      secretKeyRef:
        name: coeraise-share-config
        key: USERNAME
- op: add
  path: "/spec/template/spec/initContainers/0/env/-"
  value:
    name: TEMPLATE_GIT_PASSWORD
    valueFrom:
      secretKeyRef:
        name: coeraise-share-config
        key: PASSWORD
- op: add
  path: "/spec/template/spec/initContainers/0/env/-"
  value:
    name: TEMPLATE_GIT_BRANCH
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['TEMPLATE_GIT_BRANCH']
- op: add
  path: "/spec/template/spec/initContainers/0/env/-"
  value:
    name: STATIC_GIT_BRANCH
    valueFrom:
      fieldRef:
        fieldPath: metadata.labels['STATIC_GIT_BRANCH']