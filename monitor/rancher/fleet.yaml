defaultNamespace: cattle-monitoring-system
helm:
  releaseName: rancher-monitoring
  repo: https://charts.rancher.io
  chart: rancher-monitoring
  version: 101.0.0+up19.0.3
  values:
    alertmanager:
      alertmanagerSpec:
        configSecret: alertmanager-rancher-monitoring-alertmanager
        nodeSelector:
          monitoring: "true"
        useExistingSecret: true
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    grafana:
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
      securityContext:
        runAsNonRoot: false
      extraInitContainers:
        - name: prepare-dashboards
          image: "python:3.9-alpine3.16"
          imagePullPolicy: Always
          securityContext:
            runAsUser: 0
          command: ["/bin/sh"]
          args:
            - '-c'
            - >-
              apk add git jsonnet && git clone -single-branch \
              --branch grafana_${GIT_BRANCH_STAGE} https://${GIT_USERNAME}:${GIT_PASSWORD}@${GIT_REPO#"https://"}
          env:
            - name: GIT_REPO
              valueFrom:
                secretKeyRef:
                  name: "config-repository"
                  key: REPOSITORY
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: "config-repository"
                  key: USERNAME
            - name: GIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "config-repository"
                  key: PASSWORD
            - name: GIT_BRANCH_STAGE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['stage']
      persistence:
        enabled: true
        existingClaim: grafana-pvc
      admin:
        # Run `grafana-cli --config "/etc/grafana/grafana.ini" admin reset-admin-password <PWD>`
        # in the grafana pod if the admin user already exists
        existingSecret: grafana-generics
        userKey: admin-user
        passwordKey: admin-password
      grafana.ini:
        dashboards:
          default_home_dashboard_path: /tmp/dashboards/JupyterHub Dashboards/hub-usage-stats.json
        database:
          type: postgres
          host: $__file{/etc/secrets/grafana_generics/SQL_HOST}
          user: $__file{/etc/secrets/grafana_generics/SQL_USER}
          password: $__file{/etc/secrets/grafana_generics/SQL_PASSWORD}
        server:
          domain: jupyter-jsc.fz-juelich.de
          root_url: "%(protocol)s://%(domain)s/grafana"
          serve_from_sub_path: true
        smtp:
          enabled: true
          from_address: jupyter.jsc@fz-juelich.de
          from_name: Jupyter-JSC Monitoring
          host: mail.fz-juelich.de:25      
      extraSecretMounts:
        - name: grafana-generics-secret-mount
          secretName: grafana-generics
          defaultMode: 0440
          mountPath: /etc/secrets/grafana_generics
          readOnly: true
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          annotations: 
            grafana_folder: Default
          searchNamespace: ALL
          folderAnnotation: grafana_folder
          provider:
            foldersFromFilesStructure: true
      extraInitContainers:
        - name: set-istio-dashboard-annotations
          image: alpine/k8s:1.23.17
          volumeMounts:
            - name: init-kubeconfig
              mountPath: /tmp/init_kubeconfig.sh
              subPath: init_kubeconfig.sh
          command:
            - /bin/sh
          args:
          - '-c'
          - source /tmp/init_kubeconfig.sh && kubectl annotate cm -n cattle-dashboards -l istio_dashboard=1 --overwrite grafana_folder=Istio
      extraConfigmapMounts:
        - name: init-kubeconfig
          configMap: init-kubeconfig
          mountPath: /tmp/init_kubeconfig.sh
          subPath: init_kubeconfig.sh
          readOnly: true
      ingress:
        enabled: true
        hosts:
          - "jupyter-jsc.fz-juelich.de"
        path: "/grafana"
    ingressNginx:
      enabled: false
    # workaround for broken grafana dashboards. Deploy manual cAdvisor ( https://github.com/rancher/rancher/issues/38934#issuecomment-1294585708 )
    kubelet:
      serviceMonitor:
        cAdvisor: false
    kube-state-metrics:
      #prometheus:
      #  monitor:
      #    enabled: true
      #    additionalLabels:
      #      release: "kube-prometheus-stack"
      metricLabelsAllowlist:
         # to select jupyterhub/singeuser-server metrics
         - nodes=[nodepool]
         - pods=[app,component,hub.jupyter.org/username,hub.jupyter.org/vo,hub.jupyter.org/name,hub.jupyter.org/service,hub.jupyter.org/system,hub.jupyter.org/account,hub.jupyter.org/project,hub.jupyter.org/partition,hub.jupyter.org/nodes,hub.jupyter.org/gpus,hub.jupyter.org/runtime,hub.jupyter.org/reservation]
         - services=[app,component,hub.jupyter.org/username,hub.jupyter.org/vo,hub.jupyter.org/name,hub.jupyter.org/service,hub.jupyter.org/system,hub.jupyter.org/account,hub.jupyter.org/project,hub.jupyter.org/partition,hub.jupyter.org/nodes,hub.jupyter.org/gpus,hub.jupyter.org/runtime,hub.jupyter.org/reservation]
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
    prometheus:
      prometheusSpec:
        resources:
          limits:
            memory: 8500Mi
            cpu: 4000m
          requests:
            memory: 750Mi
            cpu: 750m
        evaluationInterval: 1m
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
        retentionSize: 45GiB
        scrapeInterval: 1m
        storageSpec:
          volumeClaimTemplate:
            spec:
              resources:
                requests:
                  storage: 50Gi
              storageClassName: csi-cinder-sc-retain
    prometheus-adapter:
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
    prometheusOperator:
      admissionWebhooks:
        patch:
          nodeSelector:
            monitoring: "true"
          tolerations:
            - key: "monitoring"
              value: "true"
              effect: "NoExecute"
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
    rkeControllerManager:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeEtcd:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeIngressNginx:
      clients:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeProxy:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeScheduler:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
kustomize:
  dir: overlays
targetCustomizations:
  - name: staging
    clusterSelector:
      matchLabels:
        stage: staging
    helm:
      values:
        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                cpu: 50m
                memory: 250Mi
        grafana:
          labels:
            stage: staging
          resources:
            requests:
              cpu: 10m
              memory: 150Mi
            limits:
              cpu: 100m
              memory: 250Mi
          grafana.ini:
            server:
              domain: jupyter-jsc-staging.fz-juelich.de
          ingress:
            hosts:
              - "jupyter-jsc-staging.fz-juelich.de"
        kube-state-metrics:
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              cpu: 50m
              memory: 200Mi
        prometheus:
          prometheusSpec:
            resources:
              requests:
                memory: 2000Mi
                cpu: 300m
              limits:
                memory: 4000Mi
                cpu: 1000m
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 10m
              memory: 20Mi
            limits:
              cpu: 50m
              memory: 50Mi
        prometheusOperator:
          resources:
            requests:
              cpu: 10m
              memory: 150Mi
            limits:
              cpu: 50m
              memory: 500Mi
dependsOn:
  - name: basics-ingress
  - name: basics-monitor-cadvisor
  - name: basics-monitor-crd
  - name: basics-monitor-storage
diff:
  comparePatches:
  - apiVersion: admissionregistration.k8s.io/v1
    kind: MutatingWebhookConfiguration
    name: rancher-monitoring-admission
    operations:
    - {"op":"remove", "path":"/webhooks"}
  - apiVersion: admissionregistration.k8s.io/v1
    kind: ValidatingWebhookConfiguration
    name: rancher-monitoring-admission
    jsonPointers:
    - "/webhooks"
