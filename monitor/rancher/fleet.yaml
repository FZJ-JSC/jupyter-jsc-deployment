defaultNamespace: cattle-monitoring-system
helm:
  releaseName: rancher-monitoring
  repo: https://charts.rancher.io
  chart: rancher-monitoring
  version: 100.1.2+up19.0.3
  values:
    alertmanager:
      alertmanagerSpec:
        configSecret: alertmanager-rancher-monitoring-alertmanager
        nodeSelector:
          monitoring: "true"
        useExistingSecret: true
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    grafana:
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
      persistence:
        enabled: true
        existingClaim: grafana-pvc
      grafana.ini:
        smtp:
          enabled: true
          from_address: jupyter.jsc@fz-juelich.de
          from_name: Jupyter-JSC Monitoring
          host: mail.fz-juelich.de:25
    ingressNginx:
      enabled: true
    kube-state-metrics:
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
    prometheus:
      prometheusSpec:
        resources:
          limits:
            memory: 1500Mi
            cpu: 1000m
          requests:
            memory: 750Mi
            cpu: 750m
        evaluationInterval: 1m
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
        retentionSize: 45GiB
        scrapeInterval: 1m
        storageSpec:
          volumeClaimTemplate:
            spec:
              resources:
                requests:
                  storage: 50Gi
              storageClassName: csi-cinder-sc-retain
    prometheus-adapter:
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
    prometheusOperator:
      admissionWebhooks:
        patch:
          nodeSelector:
            monitoring: "true"
          tolerations:
            - key: "monitoring"
              value: "true"
              effect: "NoExecute"
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
    rkeControllerManager:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeEtcd:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeIngressNginx:
      clients:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeProxy:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeScheduler:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
targetustomizations:
  - name: k3d
    clusterSelector:
      matchLabels:
        stage: dev
        provider.cattle.io: k3s
    helm:
      values:
        alertmanager:
          enabled: false
        grafana:  
          persistence:
            accessModes:
              - ReadWriteOnce
            enabled: true
            size: 5Gi
            storageClassName: null
        k3sControllerManager:
          enabled: true
        k3sProxy:
          enabled: true
        k3sScheduler:
          enabled: true
        k3sServer:
          enabled: true
        prometheus:
          prometheusSpec:
            evaluationInterval: 1m
            resources:
              limits:
                memory: 1500Mi
                cpu: 1000m
              requests:
                memory: 750Mi
                cpu: 750m
            retention: 7d
            retentionSize: 20GiB
            scrapeInterval: 1m
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes:
                  - ReadWriteOnce
                  resources:
                    requests:
                      storage: 20Gi
                  volumeMode: Filesystem
dependsOn:
  - name: basics-ingress
  - name: basics-monitor-crd
  - name: basics-monitor-storage
