defaultNamespace: cattle-monitoring-system
helm:
  releaseName: rancher-monitoring
  repo: https://charts.rancher.io
  chart: rancher-monitoring
  version: 100.1.2+up19.0.3
  values:
    alertmanager:
      alertmanagerSpec:
        configSecret: alertmanager-rancher-monitoring-alertmanager
        nodeSelector:
          monitoring: "true"
        useExistingSecret: true
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    grafana:
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
      persistence:
        enabled: true
        existingClaim: grafana-pvc
      grafana.ini:
        smtp:
          enabled: true
          from_address: jupyter.jsc@fz-juelich.de
          from_name: Jupyter-JSC Monitoring
          host: mail.fz-juelich.de:25
    ingressNginx:
      enabled: false
    kube-state-metrics:
      metricLabelsAllowlist:
         # to select jupyterhub/singeuser-server services and get the service metrics
         - pods=[app,component]
         - services=[app,component,hub.jupyter.org/username,hub.jupyter.org/vo,hub.jupyter.org/name,hub.jupyter.org/service,hub.jupyter.org/system,hub.jupyter.org/account,hub.jupyter.org/project,hub.jupyter.org/partition,hub.jupyter.org/nodes,hub.jupyter.org/gpus,hub.jupyter.org/runtime,hub.jupyter.org/reservation]
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
    prometheus:
      prometheusSpec:
        resources:
          limits:
            memory: 8500Mi
            cpu: 4000m
          requests:
            memory: 750Mi
            cpu: 750m
        evaluationInterval: 1m
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
        retentionSize: 45GiB
        scrapeInterval: 1m
        storageSpec:
          volumeClaimTemplate:
            spec:
              resources:
                requests:
                  storage: 50Gi
              storageClassName: csi-cinder-sc-retain
    prometheus-adapter:
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
    prometheusOperator:
      admissionWebhooks:
        patch:
          nodeSelector:
            monitoring: "true"
          tolerations:
            - key: "monitoring"
              value: "true"
              effect: "NoExecute"
      nodeSelector:
        monitoring: "true"
      tolerations:
        - key: "monitoring"
          value: "true"
          effect: "NoExecute"
    rkeControllerManager:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeEtcd:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeIngressNginx:
      clients:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeProxy:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
    rkeScheduler:
      enabled: true
      proxy:
        nodeSelector:
          monitoring: "true"
        tolerations:
          - key: "monitoring"
            value: "true"
            effect: "NoExecute"
dependsOn:
  - name: basics-ingress
  - name: basics-monitor-crd
  - name: basics-monitor-storage
diff:
  comparePatches:
  - apiVersion: admissionregistration.k8s.io/v1
    kind: MutatingWebhookConfiguration
    name: rancher-monitoring-admission
    operations:
    - {"op":"remove", "path":"/webhooks"}
  - apiVersion: admissionregistration.k8s.io/v1
    kind: ValidatingWebhookConfiguration
    name: rancher-monitoring-admission
    jsonPointers:
    - "/webhooks"
