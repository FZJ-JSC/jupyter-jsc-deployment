defaultNamespace: kube-system
helm:
  releaseName: cinder
  chart: https://github.com/kubernetes/cloud-provider-openstack/releases/download/openstack-cinder-csi-1.4.9/openstack-cinder-csi-1.4.9.tgz
  values:
    storageClass:
      enabled: False
      custom: |-
        ---
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: csi-cinder-sc-retain
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
        provisioner: cinder.csi.openstack.org
        reclaimPolicy: Retain
        allowVolumeExpansion: false
        parameters:
          availability: nova
    secret:
      enabled: true
      name: cloud-config


