apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "rancher-monitoring-storage.name" . }}-grafana-pv
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: {{ .Values.grafana.size }}
  nfs:
    path: {{ .Values.grafana.path }}
    server: {{ .Values.grafana.server }}
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rancher-monitoring-storage.name" . }}-grafana-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.grafana.size }}
  volumeName: {{ include "rancher-monitoring-storage.name" . }}-grafana-pv
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "rancher-monitoring-storage.name" . }}-prometheus-pv
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: {{ .Values.prometheus.size }}
  nfs:
    path: {{ .Values.prometheus.path }}
    server: {{ .Values.prometheus.server }}
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
