defaultNamespace: ingress-nginx
helm:
  releaseName: ingress-nginx
  chart: https://github.com/kubernetes/ingress-nginx/releases/download/helm-chart-4.7.0/ingress-nginx-4.7.0.tgz
  values:
    controller:
      admissionWebhooks:
        patch:
          labels:
            sidecar.istio.io/inject: "false"
      annotations:
        sidecar.istio.io/inject: "true"
        traffic.sidecar.istio.io/excludeInboundPorts: 80,443
        traffic.sidecar.istio.io/excludeOutboundIPRanges: 10.90.0.0/16,10.45.0.0/16
        traffic.sidecar.istio.io/includeInboundPorts: ""
      ingressClassResource:
        default: true
      config:
        compute-full-forwarded-for: "true"
        proxy-real-ip-cidr: 0.0.0.0/0
        real-ip-header: proxy_protocol
        use-forwarded-headers: "true"
        use-proxy-protocol: "true"
        use-http2: false
        upstream-keepalive-connections: "0"
        ssl-session-timeout: "1d"
        ssl-session-cache-size: "50m"
        ssl-protocols: "TLSv1.2 TLSv1.3"
        http-snippet: |
          upstream jupyterjsc-retries {
              server jupyterjsc-proxy-public.jupyter.svc:443 max_fails=0;
              server jupyterjsc-proxy-public-0.jupyter.svc:443 max_fails=0;
              server jupyterjsc-proxy-public-1.jupyter.svc:443 max_fails=0;
              server jupyterjsc-proxy-public-2.jupyter.svc:443 max_fails=0;
              server jupyterjsc-proxy-public-3.jupyter.svc:443 max_fails=0;
              server jupyterjsc-proxy-public-4.jupyter.svc:443 max_fails=0;
              keepalive 32;
          }
          upstream juniq-retries {
              server juniq-proxy-public.jupyter.svc:443 max_fails=0;
              server juniq-proxy-public-0.jupyter.svc:443 max_fails=0;
              server juniq-proxy-public-1.jupyter.svc:443 max_fails=0;
              server juniq-proxy-public-2.jupyter.svc:443 max_fails=0;
              server juniq-proxy-public-3.jupyter.svc:443 max_fails=0;
              server juniq-proxy-public-4.jupyter.svc:443 max_fails=0;
              keepalive 32;
          }
          upstream eurocc-retries {
              server eurocc-proxy-public.jupyter.svc:443 max_fails=0;
              server eurocc-proxy-public-0.jupyter.svc:443 max_fails=0;
              server eurocc-proxy-public-1.jupyter.svc:443 max_fails=0;
              server eurocc-proxy-public-2.jupyter.svc:443 max_fails=0;
              server eurocc-proxy-public-3.jupyter.svc:443 max_fails=0;
              server eurocc-proxy-public-4.jupyter.svc:443 max_fails=0;
              keepalive 32;
          }
          upstream portalgauss-retries {
              server portalgauss-proxy-public.jupyter.svc:443 max_fails=0;
              server portalgauss-proxy-public-0.jupyter.svc:443 max_fails=0;
              server portalgauss-proxy-public-1.jupyter.svc:443 max_fails=0;
              server portalgauss-proxy-public-2.jupyter.svc:443 max_fails=0;
              server portalgauss-proxy-public-3.jupyter.svc:443 max_fails=0;
              server portalgauss-proxy-public-4.jupyter.svc:443 max_fails=0;
              keepalive 32;
          }
          upstream coec-retries {
              server coec-proxy-public.jupyter.svc:443 max_fails=0;
              server coec-proxy-public-0.jupyter.svc:443 max_fails=0;
              server coec-proxy-public-1.jupyter.svc:443 max_fails=0;
              server coec-proxy-public-2.jupyter.svc:443 max_fails=0;
              server coec-proxy-public-3.jupyter.svc:443 max_fails=0;
              server coec-proxy-public-4.jupyter.svc:443 max_fails=0;
              keepalive 32;
          }
          upstream coeraise-retries {
              server coeraise-proxy-public.jupyter.svc:443 max_fails=0;
              server coeraise-proxy-public-0.jupyter.svc:443 max_fails=0;
              server coeraise-proxy-public-1.jupyter.svc:443 max_fails=0;
              server coeraise-proxy-public-2.jupyter.svc:443 max_fails=0;
              server coeraise-proxy-public-3.jupyter.svc:443 max_fails=0;
              server coeraise-proxy-public-4.jupyter.svc:443 max_fails=0;
              keepalive 32;
          }
      extraArgs:
        enable-ssl-passthrough: ""
      kind: DaemonSet
      metrics:
        enabled: true
        serviceMonitor:
          additionalLabels:
            release: prometheus-stack
          enabled: true
          namespace: cattle-monitoring-system
          metricRelabelings:
          - action: drop
            regex: '(nginx_ingress_controller_request_duration_seconds_bucket|nginx_ingress_controller_response_size_bucket|nginx_ingress_controller_request_size_bucket|nginx_ingress_controller_response_duration_seconds_bucket|nginx_ingress_controller_bytes_sent_bucket)'
            sourceLabels: [__name__]          
      service:
        annotations:
          loadbalancer.openstack.org/keep-floatingip: true
          loadbalancer.openstack.org/proxy-protocol: "true"
          #loadbalancer.openstack.org/timeout-client-data: "600000"
          #loadbalancer.openstack.org/timeout-member-connect: "600000"
          loadbalancer.openstack.org/timeout-member-data: "600000"
