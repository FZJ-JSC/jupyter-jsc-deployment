defaultNamespace: istio-system
helm:
  releaseName: rancher-istio
  repo: https://charts.rancher.io
  chart: rancher-istio
  version: 100.4.0+up1.14.1
  values:
    ingressGateways:
      enabled: false
    kiali:
      enabled: false
targetCustomizations:
  - name: staging
    clusterSelector:
      matchLabels:
        stage: staging
    helm:
      values:
        kiali:
          enabled: false
dependsOn:
  - name: basics-monitor-crd
