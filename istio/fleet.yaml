defaultNamespace: istio-system
helm:
  releaseName: rancher-istio
  repo: https://charts.rancher.io
  chart: rancher-istio
  version: 101.0.0+up1.14.3
  values:
    ingressGateways:
      enabled: false
    kiali:
      enabled: false
kustomize:
  dir: overlays
targetCustomizations:
  - name: staging
    clusterSelector:
      matchLabels:
        stage: staging
    helm:
      values:
        kiali:
          enabled: true
dependsOn:
  - name: basics-monitor-crd
