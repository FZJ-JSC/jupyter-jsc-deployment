defaultNamespace: jupyterjsc
helm:
  chart: /workspace/source/hub-base/helper-each
  releaseName: jupyterjsc-jhub-default-helper 
  values:
    nameOverride: jhub-default-helper
    appName: default
    proxyBackup:
      name: default-proxy-public
      release: jupyterhub-default
      numberOfBackups: 5
    serviceStatic:
      name: default-static-files
