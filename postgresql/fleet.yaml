defaultNamespace: database
helm:
  releaseName: postgresql
  repo: https://charts.bitnami.com/bitnami
  chart: postgresql
  version: 11.9.13
  values:
    auth:
      existingSecret: "postgresql-auth"
    primary:
      extraEnvVarsSecret: "postgresql-users"
      initdb:
        scriptsSecret: "init-db"
      nodeSelector:
        worker: "true"
      persistence:
        existingClaim: "data-postgresql"
      podAnnotations:
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
dependsOn:
  - name: basics-postgresql-storage
  - name: basics-istio
